<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframes — Аренда парковочных мест</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ece4;
    --wire-bg: #ffffff;
    --wire-border: #c8c2b8;
    --wire-fill: #e8e4dc;
    --wire-text: #2d2a26;
    --wire-text2: #8a847a;
    --wire-accent: #3b6df0;
    --wire-accent2: #2952c0;
    --wire-green: #2e9e5e;
    --wire-red: #d44040;
    --wire-orange: #d4842a;
    --shadow: 0 2px 20px rgba(0,0,0,0.06);
    --phone-w: 375px;
    --phone-h: 760px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--wire-text);
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(240,236,228,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--wire-border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar h1 {
    font-size: 16px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .topbar h1 span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    background: var(--wire-accent);
    color: #fff;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .topbar .role-pills {
    display: flex; gap: 6px;
  }
  .role-pill {
    font-size: 12px; font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
    border: 1.5px solid var(--wire-border);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .role-pill:hover { border-color: var(--wire-text2); }
  .role-pill.active {
    background: var(--wire-text);
    color: var(--wire-bg);
    border-color: var(--wire-text);
  }

  /* ── Main layout ── */
  .main {
    display: flex;
    gap: 0;
    height: calc(100vh - 52px);
  }

  /* Sidebar */
  .sidebar {
    width: 240px;
    border-right: 1px solid var(--wire-border);
    background: rgba(255,255,255,0.5);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 16px 0;
  }
  .sidebar-group {
    padding: 0 16px;
    margin-bottom: 16px;
  }
  .sidebar-group-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--wire-text2);
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .screen-btn {
    display: block; width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 8px 12px;
    border-radius: 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--wire-text);
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .screen-btn:hover { background: var(--wire-fill); }
  .screen-btn.active {
    background: var(--wire-text);
    color: var(--wire-bg);
    font-weight: 600;
  }
  .screen-btn .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.5;
    margin-right: 6px;
  }

  /* Canvas area */
  .canvas {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    padding: 40px;
  }

  /* Phone frame */
  .phone {
    width: var(--phone-w);
    height: var(--phone-h);
    background: var(--wire-bg);
    border-radius: 40px;
    border: 2px solid var(--wire-border);
    box-shadow: var(--shadow), 0 0 0 8px rgba(200,194,184,0.2);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Phone status bar */
  .phone-status {
    height: 48px;
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    color: var(--wire-text);
    flex-shrink: 0;
  }
  .phone-status .icons { display: flex; gap: 4px; align-items: center; }
  .phone-status .icons span { display: block; width: 16px; height: 10px; background: var(--wire-text); border-radius: 2px; opacity: 0.4; }

  /* Phone nav bar */
  .phone-nav {
    height: 52px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid var(--wire-fill);
    background: var(--wire-bg);
    flex-shrink: 0;
    padding: 0 16px;
  }
  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    font-size: 9px; font-weight: 600;
    color: var(--wire-text2);
    cursor: pointer;
  }
  .nav-item.active { color: var(--wire-accent); }
  .nav-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
  }

  /* Phone content */
  .phone-content {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  /* ── Wireframe elements ── */
  .w-header {
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--wire-fill);
  }
  .w-back {
    width: 32px; height: 32px; border-radius: 10px;
    border: 1.5px solid var(--wire-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--wire-text);
  }
  .w-title { font-size: 16px; font-weight: 700; }
  .w-subtitle { font-size: 11px; color: var(--wire-text2); font-weight: 500; }

  .w-section { padding: 16px 20px; }
  .w-section-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--wire-text2);
    margin-bottom: 12px;
  }

  .w-input {
    width: 100%; height: 44px;
    border: 1.5px solid var(--wire-border);
    border-radius: 10px;
    padding: 0 14px;
    font-size: 13px; color: var(--wire-text2);
    display: flex; align-items: center;
    margin-bottom: 10px;
    background: var(--wire-bg);
  }
  .w-input.search {
    background: var(--wire-fill);
    border-color: transparent;
  }
  .w-input .icon { margin-right: 10px; font-size: 16px; opacity: 0.4; }

  .w-btn {
    width: 100%; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    margin-bottom: 10px;
    border: none;
  }
  .w-btn.primary { background: var(--wire-accent); color: #fff; }
  .w-btn.secondary { background: transparent; border: 1.5px solid var(--wire-border); color: var(--wire-text); }
  .w-btn.ghost { background: transparent; color: var(--wire-accent); }

  .w-card {
    background: var(--wire-bg);
    border: 1.5px solid var(--wire-border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .w-card-img {
    height: 120px;
    background: var(--wire-fill);
    display: flex; align-items: center; justify-content: center;
    color: var(--wire-text2); font-size: 12px;
    position: relative;
  }
  .w-card-img .badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--wire-green); color: #fff;
    font-size: 10px; font-weight: 700;
    padding: 3px 10px; border-radius: 6px;
  }
  .w-card-img .price {
    position: absolute; bottom: 10px; right: 10px;
    background: var(--wire-text); color: #fff;
    font-size: 12px; font-weight: 700;
    padding: 4px 12px; border-radius: 8px;
  }
  .w-card-body { padding: 12px 14px; }
  .w-card-body h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .w-card-body p { font-size: 11px; color: var(--wire-text2); line-height: 1.5; }

  .w-placeholder {
    height: 180px;
    background: var(--wire-fill);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--wire-text2); font-size: 12px;
    margin-bottom: 12px;
    border: 1.5px dashed var(--wire-border);
  }
  .w-placeholder .ph-icon { font-size: 28px; margin-bottom: 6px; opacity: 0.4; }

  .w-list-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--wire-fill);
  }
  .w-list-item:last-child { border-bottom: none; }
  .w-list-avatar {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--wire-fill);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: var(--wire-text2);
    flex-shrink: 0;
  }
  .w-list-content { flex: 1; }
  .w-list-content h5 { font-size: 13px; font-weight: 600; }
  .w-list-content p { font-size: 11px; color: var(--wire-text2); }
  .w-list-right { font-size: 11px; color: var(--wire-text2); text-align: right; }

  .w-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 6px; margin-right: 4px; }
  .w-tag.green { background: rgba(46,158,94,0.12); color: var(--wire-green); }
  .w-tag.orange { background: rgba(212,132,42,0.12); color: var(--wire-orange); }
  .w-tag.red { background: rgba(212,64,64,0.12); color: var(--wire-red); }
  .w-tag.blue { background: rgba(59,109,240,0.12); color: var(--wire-accent); }

  .w-calendar {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    margin-bottom: 12px;
  }
  .w-cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .w-cal-day.header { font-size: 9px; font-weight: 700; color: var(--wire-text2); }
  .w-cal-day.available { background: rgba(59,109,240,0.08); color: var(--wire-accent); cursor: pointer; }
  .w-cal-day.booked { background: var(--wire-fill); color: var(--wire-text2); text-decoration: line-through; }
  .w-cal-day.selected { background: var(--wire-accent); color: #fff; font-weight: 700; }
  .w-cal-day.empty { }

  .w-chat-msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .w-chat-msg.incoming {
    background: var(--wire-fill);
    color: var(--wire-text);
    border-bottom-left-radius: 4px;
    margin-right: auto;
  }
  .w-chat-msg.outgoing {
    background: var(--wire-accent);
    color: #fff;
    border-bottom-right-radius: 4px;
    margin-left: auto;
  }
  .w-chat-time {
    font-size: 9px;
    color: var(--wire-text2);
    margin-bottom: 12px;
  }
  .w-chat-time.right { text-align: right; }

  .w-chat-input {
    display: flex; gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--wire-fill);
  }
  .w-chat-input input {
    flex: 1; height: 38px;
    border-radius: 20px;
    border: 1.5px solid var(--wire-border);
    padding: 0 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
  }
  .w-chat-input button {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--wire-accent);
    border: none; color: #fff;
    font-size: 16px; cursor: pointer;
  }

  .w-stat-row {
    display: flex; gap: 10px;
    margin-bottom: 12px;
  }
  .w-stat-box {
    flex: 1;
    background: var(--wire-fill);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .w-stat-box .num { font-size: 22px; font-weight: 700; color: var(--wire-text); }
  .w-stat-box .label { font-size: 10px; color: var(--wire-text2); margin-top: 2px; }

  /* ── Desktop admin ── */
  .phone.admin-desktop {
    width: 660px;
    border-radius: 16px;
  }
  .phone.admin-desktop .phone-status {
    height: 36px;
    padding: 8px 16px 0;
  }
  .phone.admin-desktop .phone-nav { display: none; }
  .admin-sidebar {
    width: 180px;
    border-right: 1px solid var(--wire-fill);
    padding: 12px;
    flex-shrink: 0;
  }
  .admin-sidebar .as-item {
    font-size: 12px; font-weight: 500;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 2px;
    cursor: pointer;
    color: var(--wire-text2);
  }
  .admin-sidebar .as-item.active {
    background: var(--wire-accent);
    color: #fff;
    font-weight: 600;
  }
  .admin-body {
    display: flex; flex: 1; overflow: hidden;
  }
  .admin-content { flex: 1; overflow-y: auto; }

  /* screen label */
  .screen-label {
    position: absolute;
    top: 52px; left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 600;
    background: var(--wire-text);
    color: var(--wire-bg);
    padding: 3px 10px;
    border-radius: 0 0 6px 6px;
    z-index: 5;
    white-space: nowrap;
  }

  /* Annotation panel */
  .annotations {
    width: 280px;
    padding: 24px;
    overflow-y: auto;
    border-left: 1px solid var(--wire-border);
    background: rgba(255,255,255,0.4);
    flex-shrink: 0;
  }
  .annotations h3 {
    font-size: 14px; font-weight: 700;
    margin-bottom: 4px;
  }
  .annotations .ann-subtitle {
    font-size: 11px; color: var(--wire-text2);
    margin-bottom: 16px;
  }
  .ann-item {
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--wire-fill);
  }
  .ann-item:last-child { border-bottom: none; }
  .ann-item h4 {
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px;
  }
  .ann-item h4 .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--wire-accent);
  }
  .ann-item p { font-size: 11px; color: var(--wire-text2); line-height: 1.5; }

  /* Responsive */
  @media (max-width: 1024px) {
    .sidebar { width: 180px; }
    .annotations { width: 220px; }
  }
  @media (max-width: 768px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; height: auto; display: flex; overflow-x: auto; padding: 8px; border-right: none; border-bottom: 1px solid var(--wire-border); }
    .sidebar-group { margin-bottom: 0; display: flex; gap: 4px; align-items: center; }
    .sidebar-group-title { display: none; }
    .screen-btn { white-space: nowrap; }
    .canvas { padding: 20px; }
    .annotations { width: 100%; border-left: none; border-top: 1px solid var(--wire-border); }
    .phone { transform: scale(0.85); transform-origin: top center; }
    .phone.admin-desktop { transform: scale(0.55); }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>Wireframes <span>ЭТАП 3</span></h1>
  <div class="role-pills">
    <button class="role-pill active" onclick="switchRole('tenant')">Арендатор</button>
    <button class="role-pill" onclick="switchRole('owner')">Арендодатель</button>
    <button class="role-pill" onclick="switchRole('admin')">Админ</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="canvas" id="canvas"></div>
  <div class="annotations" id="annotations"></div>
</div>

<script>
const screens = {
  tenant: [
    {
      group: "Онбординг",
      items: [
        {
          id: "t-splash", name: "Splash / Вход",
          annotations: [
            { title: "Логотип", desc: "Логотип приложения по центру. Анимация появления." },
            { title: "Вход по телефону", desc: "Поле ввода номера +7. Кнопка «Получить код». Ссылка «Условия использования»." },
            { title: "Альтернативный вход", desc: "Через Госуслуги (если будет) — кнопка ниже." },
          ],
          render: () => `
            <div class="phone-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;">
              <div style="width:80px;height:80px;border-radius:20px;background:var(--wire-accent);margin-bottom:24px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;">P</div>
              <div style="font-size:22px;font-weight:800;margin-bottom:6px;">ParkRent</div>
              <div style="font-size:12px;color:var(--wire-text2);margin-bottom:40px;">Аренда парковочных мест</div>
              <div class="w-input" style="margin-bottom:16px;"><span class="icon">🇷🇺</span> +7 (___) ___-__-__</div>
              <div class="w-btn primary">Получить код</div>
              <div style="font-size:11px;color:var(--wire-text2);margin-top:16px;">Продолжая, вы принимаете<br><span style="color:var(--wire-accent)">Условия использования</span></div>
            </div>`
        },
        {
          id: "t-otp", name: "SMS-код",
          annotations: [
            { title: "Ввод кода", desc: "4 отдельных поля для цифр. Автофокус. Таймер повторной отправки (60 сек)." },
            { title: "Автозаполнение", desc: "iOS/Android подхватывают SMS автоматически." },
          ],
          render: () => `
            <div class="w-header"><div class="w-back">←</div><div class="w-title">Введите код</div></div>
            <div class="phone-content" style="padding:32px 24px;text-align:center;">
              <div style="font-size:13px;color:var(--wire-text2);margin-bottom:24px;">Код отправлен на<br><b>+7 (999) 123-45-67</b></div>
              <div style="display:flex;gap:12px;justify-content:center;margin-bottom:32px;">
                ${[1,2,3,4].map((_, i) => `<div style="width:52px;height:56px;border-radius:12px;border:2px solid ${i<2?'var(--wire-accent)':'var(--wire-border)'};display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;">${i<2?'•':''}</div>`).join('')}
              </div>
              <div style="font-size:12px;color:var(--wire-text2);">Отправить повторно через <b>0:47</b></div>
            </div>`
        },
        {
          id: "t-role", name: "Выбор роли",
          annotations: [
            { title: "Два варианта", desc: "Карточки: «Ищу место» (арендатор) и «Сдаю место» (арендодатель). Крупные иконки." },
            { title: "Смена роли", desc: "Позже можно добавить вторую роль в настройках." },
          ],
          render: () => `
            <div class="w-header"><div class="w-back">←</div><div class="w-title">Кто вы?</div></div>
            <div class="phone-content" style="padding:24px 20px;">
              <div style="font-size:13px;color:var(--wire-text2);margin-bottom:24px;text-align:center;">Выберите основную роль</div>
              <div class="w-card" style="cursor:pointer;border-color:var(--wire-accent);border-width:2px;">
                <div style="padding:20px;text-align:center;">
                  <div style="font-size:36px;margin-bottom:8px;">🚗</div>
                  <div style="font-size:16px;font-weight:700;">Ищу место</div>
                  <div style="font-size:12px;color:var(--wire-text2);margin-top:4px;">Арендую парковочные места</div>
                </div>
              </div>
              <div class="w-card" style="cursor:pointer;">
                <div style="padding:20px;text-align:center;">
                  <div style="font-size:36px;margin-bottom:8px;">🏢</div>
                  <div style="font-size:16px;font-weight:700;">Сдаю место</div>
                  <div style="font-size:12px;color:var(--wire-text2);margin-top:4px;">Размещаю своё парковочное место</div>
                </div>
              </div>
              <div class="w-btn primary" style="margin-top:20px;">Продолжить</div>
            </div>`
        },
      ]
    },
    {
      group: "Основной флоу",
      items: [
        {
          id: "t-map", name: "Карта / Поиск",
          annotations: [
            { title: "Яндекс.Карты", desc: "Полноэкранная карта. Метки паркингов — кластеры и точки. Нажатие → превью карточки снизу." },
            { title: "Поиск и фильтры", desc: "Строка поиска сверху. Быстрые фильтры: «Сейчас», «Сегодня», «Месяц». Полные фильтры — район, цена, даты." },
            { title: "Переключение", desc: "Тогл карта ↔ список в правом верхнем углу." },
          ],
          render: () => `

let currentRole = 'tenant';
let currentScreen = null;

function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchRole('${role}')"]`).classList.add('active');
  renderSidebar();
  const firstItem = screens[role][0].items[0];
  selectScreen(firstItem.id);
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  screens[currentRole].forEach(group => {
    const div = document.createElement('div');
    div.className = 'sidebar-group';
    div.innerHTML = `<div class="sidebar-group-title">${group.group}</div>`;
    group.items.forEach((item, i) => {
      div.innerHTML += `<button class="screen-btn" id="sb-${item.id}" onclick="selectScreen('${item.id}')">
        <span class="num">${String(i+1).padStart(2,'0')}</span>${item.name}
      </button>`;
    });
    sb.appendChild(div);
  });
}

function findScreen(id) {
  for (const role of Object.values(screens)) {
    for (const group of role) {
      for (const item of group.items) {
        if (item.id === id) return item;
      }
    }
  }
  return null;
}

function selectScreen(id) {
  currentScreen = id;
  document.querySelectorAll('.screen-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('sb-' + id);
  if (btn) btn.classList.add('active');

  const screen = findScreen(id);
  if (!screen) return;

  const canvas = document.getElementById('canvas');
  const isAdmin = screen.isAdmin;
  
  canvas.innerHTML = `
    <div class="phone ${isAdmin ? 'admin-desktop' : ''}">
      <div class="phone-status">
        <span>9:41</span>
        <div class="icons"><span></span><span style="width:12px;"></span><span style="width:20px;border-radius:3px;"></span></div>
      </div>
      <div class="screen-label">${screen.name}</div>
      ${screen.render()}
      ${!isAdmin ? `
      <div class="phone-nav">
        <div class="nav-item ${['t-map'].includes(id)?'active':''}"><div class="nav-icon">🗺</div>Карта</div>
        <div class="nav-item ${['t-bookings','o-listings'].includes(id)?'active':''}"><div class="nav-icon">${currentRole==='owner'?'🏠':'📋'}</div>${currentRole==='owner'?'Места':'Брони'}</div>
        <div class="nav-item ${['t-chat','o-add'].includes(id)?'active':''}"><div class="nav-icon">${currentRole==='owner'?'+':'💬'}</div>${currentRole==='owner'?'Добавить':'Чат'}</div>
        <div class="nav-item ${['o-finance'].includes(id)?'active':''}"><div class="nav-icon">💰</div>Финансы</div>
        <div class="nav-item ${['t-profile'].includes(id)?'active':''}"><div class="nav-icon">👤</div>Профиль</div>
      </div>` : ''}
    </div>`;

  // Annotations
  const ann = document.getElementById('annotations');
  ann.innerHTML = `
    <h3>${screen.name}</h3>
    <div class="ann-subtitle">${currentRole === 'tenant' ? 'Арендатор' : currentRole === 'owner' ? 'Арендодатель' : 'Администратор'}</div>
    ${screen.annotations.map(a => `
      <div class="ann-item">
        <h4><span class="dot"></span>${a.title}</h4>
        <p>${a.desc}</p>
      </div>
    `).join('')}`;
}
