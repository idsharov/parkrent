<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прототип — Аренда парковочных мест</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ece4;
    --wire-bg: #ffffff;
    --wire-border: #c8c2b8;
    --wire-fill: #e8e4dc;
    --wire-text: #2d2a26;
    --wire-text2: #8a847a;
    --wire-accent: #3b6df0;
    --wire-accent2: #2952c0;
    --wire-green: #2e9e5e;
    --wire-red: #d44040;
    --wire-orange: #d4842a;
    --phone-w: 375px;
    --phone-h: 760px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--wire-text); min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  /* ── Top pills ── */
  .top-pills {
    display:flex; gap:8px; padding:20px 0 16px; justify-content:center; flex-wrap:wrap;
  }
  .pill {
    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;
    padding:10px 28px; border-radius:100px;
    border:1.5px solid var(--wire-border); background:transparent;
    cursor:pointer; transition:all .2s; color:var(--wire-text);
  }
  .pill:hover { border-color:var(--wire-text2); }
  .pill.active { background:var(--wire-text); color:var(--wire-bg); border-color:var(--wire-text); }

  /* ── Phone ── */
  .phone-wrap { position:relative; margin-bottom:40px; }
  .phone {
    width:var(--phone-w); height:var(--phone-h);
    background:var(--wire-bg); border-radius:40px;
    border:2px solid var(--wire-border);
    box-shadow:0 2px 20px rgba(0,0,0,.06),0 0 0 8px rgba(200,194,184,.2);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
    user-select:none;
  }
  .phone.admin-mode { width:700px; border-radius:16px; }

  /* status bar */
  .phone-status {
    height:48px; padding:14px 24px 0;
    display:flex; justify-content:space-between; align-items:center;
    font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600;
    flex-shrink:0;
  }
  .phone-status .icons { display:flex; gap:4px; }
  .phone-status .icons span { display:block; width:16px; height:10px; background:var(--wire-text); border-radius:2px; opacity:.4; }

  /* content */
  .phone-content { flex:1; overflow-y:auto; overflow-x:hidden; position:relative; }

  /* bottom nav */
  .phone-nav {
    height:56px; display:flex; justify-content:space-around; align-items:center;
    border-top:1px solid var(--wire-fill); background:var(--wire-bg); flex-shrink:0;
  }
  .nav-item {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    font-size:10px; font-weight:600; color:var(--wire-text2);
    cursor:pointer; padding:4px 12px; border-radius:8px; transition:all .15s;
    position:relative;
  }
  .nav-item:active { transform:scale(.92); }
  .nav-item.active { color:var(--wire-accent); }
  .nav-icon { font-size:20px; line-height:1; }

  /* ── Tap highlight overlay ── */
  .tap-ripple {
    position:absolute; border-radius:50%;
    background:rgba(59,109,240,.15);
    pointer-events:none; transform:scale(0);
    animation:ripple .5s ease-out forwards;
    z-index:999;
  }
  @keyframes ripple { to { transform:scale(4); opacity:0; } }

  /* Hotspot hint pulse */
  .hotspot-hint {
    position:absolute; pointer-events:none; z-index:50;
    border:2px solid var(--wire-accent);
    border-radius:10px;
    animation:hintPulse 1.2s ease-out forwards;
  }
  @keyframes hintPulse {
    0% { opacity:0; transform:scale(.95); }
    30% { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(1.02); }
  }

  /* ── Clickable areas ── */
  .tap { cursor:pointer; position:relative; transition:all .12s; }
  .tap:active { transform:scale(.97); opacity:.85; }

  /* ── Shared wireframe elements ── */
  .w-header {
    padding:12px 20px; display:flex; align-items:center; gap:12px;
    border-bottom:1px solid var(--wire-fill);
  }
  .w-back {
    width:32px; height:32px; border-radius:10px;
    border:1.5px solid var(--wire-border);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; cursor:pointer; transition:all .12s;
  }
  .w-back:active { background:var(--wire-fill); transform:scale(.9); }
  .w-title { font-size:16px; font-weight:700; }
  .w-subtitle { font-size:11px; color:var(--wire-text2); }

  .w-input {
    width:100%; height:44px; border:1.5px solid var(--wire-border);
    border-radius:10px; padding:0 14px; font-size:13px; color:var(--wire-text2);
    display:flex; align-items:center; margin-bottom:10px; background:var(--wire-bg);
  }
  .w-input.search { background:var(--wire-fill); border-color:transparent; }
  .w-input .icon { margin-right:10px; font-size:16px; opacity:.4; }

  .w-btn {
    width:100%; height:48px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; margin-bottom:10px; border:none;
    cursor:pointer; transition:all .12s;
  }
  .w-btn:active { transform:scale(.97); }
  .w-btn.primary { background:var(--wire-accent); color:#fff; }
  .w-btn.secondary { background:transparent; border:1.5px solid var(--wire-border); color:var(--wire-text); }
  .w-btn.ghost { background:transparent; color:var(--wire-accent); }

  .w-card {
    background:var(--wire-bg); border:1.5px solid var(--wire-border);
    border-radius:14px; overflow:hidden; margin-bottom:12px;
  }
  .w-card-img {
    height:120px; background:var(--wire-fill);
    display:flex; align-items:center; justify-content:center;
    color:var(--wire-text2); font-size:12px; position:relative;
  }
  .badge {
    position:absolute; top:10px; left:10px;
    font-size:10px; font-weight:700; padding:3px 10px; border-radius:6px; color:#fff;
  }
  .badge.green { background:var(--wire-green); }
  .badge.orange { background:var(--wire-orange); }

  .w-tag { display:inline-block; font-size:10px; font-weight:600; padding:3px 10px; border-radius:6px; margin-right:4px; }
  .w-tag.green { background:rgba(46,158,94,.12); color:var(--wire-green); }
  .w-tag.orange { background:rgba(212,132,42,.12); color:var(--wire-orange); }
  .w-tag.red { background:rgba(212,64,64,.12); color:var(--wire-red); }
  .w-tag.blue { background:rgba(59,109,240,.12); color:var(--wire-accent); }

  .w-section-title {
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:1px; color:var(--wire-text2); margin-bottom:12px;
  }
  .w-list-item {
    display:flex; align-items:center; gap:12px;
    padding:12px 0; border-bottom:1px solid var(--wire-fill);
  }
  .w-list-item:last-child { border-bottom:none; }
  .w-list-avatar {
    width:40px; height:40px; border-radius:10px; background:var(--wire-fill);
    display:flex; align-items:center; justify-content:center; font-size:16px;
    flex-shrink:0;
  }
  .w-list-content { flex:1; }
  .w-list-content h5 { font-size:13px; font-weight:600; }
  .w-list-content p { font-size:11px; color:var(--wire-text2); }
  .w-list-right { font-size:11px; color:var(--wire-text2); text-align:right; }

  .w-placeholder {
    height:180px; background:var(--wire-fill); border-radius:14px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--wire-text2); font-size:12px; margin-bottom:12px;
    border:1.5px dashed var(--wire-border);
  }
  .w-placeholder .ph-icon { font-size:28px; margin-bottom:6px; opacity:.4; }

  .w-calendar { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:12px; }
  .w-cal-day {
    aspect-ratio:1; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:500;
  }
  .w-cal-day.header { font-size:9px; font-weight:700; color:var(--wire-text2); }
  .w-cal-day.available { background:rgba(59,109,240,.08); color:var(--wire-accent); }
  .w-cal-day.booked { background:var(--wire-fill); color:var(--wire-text2); text-decoration:line-through; }
  .w-cal-day.selected { background:var(--wire-accent); color:#fff; font-weight:700; }

  .w-stat-row { display:flex; gap:10px; margin-bottom:12px; }
  .w-stat-box { flex:1; background:var(--wire-fill); border-radius:12px; padding:14px; text-align:center; }
  .w-stat-box .num { font-size:22px; font-weight:700; }
  .w-stat-box .label { font-size:10px; color:var(--wire-text2); margin-top:2px; }

  /* Admin desktop */
  .admin-sidebar {
    width:180px; border-right:1px solid var(--wire-fill);
    padding:12px; flex-shrink:0;
  }
  .admin-sidebar .as-item {
    font-size:12px; font-weight:500; padding:8px 10px;
    border-radius:8px; margin-bottom:2px; cursor:pointer;
    color:var(--wire-text2); transition:all .12s;
  }
  .admin-sidebar .as-item:active { transform:scale(.97); }
  .admin-sidebar .as-item.active { background:var(--wire-accent); color:#fff; font-weight:600; }
  .admin-body { display:flex; flex:1; overflow:hidden; }
  .admin-content { flex:1; overflow-y:auto; }

  /* Chat */
  .w-chat-msg {
    max-width:75%; padding:10px 14px; border-radius:14px;
    font-size:13px; line-height:1.5; margin-bottom:8px;
  }
  .w-chat-msg.incoming { background:var(--wire-fill); border-bottom-left-radius:4px; margin-right:auto; }
  .w-chat-msg.outgoing { background:var(--wire-accent); color:#fff; border-bottom-right-radius:4px; margin-left:auto; }
  .w-chat-time { font-size:9px; color:var(--wire-text2); margin-bottom:12px; }
  .w-chat-time.right { text-align:right; }
  .w-chat-input {
    display:flex; gap:8px; padding:10px 16px; border-top:1px solid var(--wire-fill); flex-shrink:0;
  }
  .w-chat-input input {
    flex:1; height:38px; border-radius:20px; border:1.5px solid var(--wire-border);
    padding:0 14px; font-size:13px; font-family:'DM Sans',sans-serif; outline:none;
  }
  .w-chat-input button {
    width:38px; height:38px; border-radius:50%; background:var(--wire-accent);
    border:none; color:#fff; font-size:16px; cursor:pointer;
  }

  /* Screen transition */
  .screen-enter { animation:screenIn .3s ease; }
  @keyframes screenIn {
    from { opacity:0; transform:translateX(30px); }
    to { opacity:1; transform:translateX(0); }
  }
  .screen-back { animation:screenBack .3s ease; }
  @keyframes screenBack {
    from { opacity:0; transform:translateX(-30px); }
    to { opacity:1; transform:translateX(0); }
  }

  @media(max-width:420px) {
    .phone { width:100vw; height:100vh; border-radius:0; border:none; box-shadow:none; }
    .phone-wrap { margin:0; }
    .top-pills { padding:12px 16px 8px; }
    body { overflow:hidden; }
  }
</style>
</head>
<body>

<div class="top-pills">
  <button class="pill active" onclick="switchRole('tenant')" id="pill-tenant">Арендатор</button>
  <button class="pill" onclick="switchRole('owner')" id="pill-owner">Арендодатель</button>
  <button class="pill" onclick="switchRole('admin')" id="pill-admin">Админ</button>
</div>

<div class="phone-wrap">
  <div class="phone" id="phone"></div>
</div>

<script>
// ─── State ───
let role = 'tenant';
let history = [];
let currentScreen = null;
let hotspotTimeout = null;

// ─── Navigate ───
function go(screenId, back) {
  if (screenId === currentScreen) return;
  if (!back && currentScreen) history.push(currentScreen);
  currentScreen = screenId;
  render(back);
}

function goBack() {
  if (history.length) go(history.pop(), true);
}

function switchRole(r) {
  role = r;
  history = [];
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  document.getElementById('pill-' + r).classList.add('active');
  const phone = document.getElementById('phone');
  phone.className = r === 'admin' ? 'phone admin-mode' : 'phone';
  const startScreens = { tenant: 't-map', owner: 'o-listings', admin: 'a-dash' };
  go(startScreens[r]);
}

// ─── Tap ripple + hotspot hints ───
function initTapEffects() {
  const content = document.querySelector('.phone-content');
  if (!content) return;
  content.addEventListener('click', function(e) {
    // if tapped on a .tap element, no hint needed
    if (e.target.closest('.tap')) return;
    // Show ripple
    const rect = content.getBoundingClientRect();
    const ripple = document.createElement('div');
    ripple.className = 'tap-ripple';
    ripple.style.width = ripple.style.height = '40px';
    ripple.style.left = (e.clientX - rect.left - 20) + 'px';
    ripple.style.top = (e.clientY - rect.top + content.scrollTop - 20) + 'px';
    content.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);
    // Show hotspot hints on tappable areas
    showHotspots();
  });
}

function showHotspots() {
  clearTimeout(hotspotTimeout);
  document.querySelectorAll('.hotspot-hint').forEach(h => h.remove());
  document.querySelectorAll('.phone-content .tap').forEach(el => {
    const rect = el.getBoundingClientRect();
    const container = document.querySelector('.phone-content');
    const cRect = container.getBoundingClientRect();
    const hint = document.createElement('div');
    hint.className = 'hotspot-hint';
    hint.style.left = (rect.left - cRect.left - 2) + 'px';
    hint.style.top = (rect.top - cRect.top + container.scrollTop - 2) + 'px';
    hint.style.width = (rect.width + 4) + 'px';
    hint.style.height = (rect.height + 4) + 'px';
    container.appendChild(hint);
  });
  hotspotTimeout = setTimeout(() => {
    document.querySelectorAll('.hotspot-hint').forEach(h => h.remove());
  }, 1200);
}

// ─── Render ───
function render(back) {
  const phone = document.getElementById('phone');
  const s = allScreens[currentScreen];
  if (!s) return;
  const isAdmin = currentScreen.startsWith('a-');
  const animClass = back ? 'screen-back' : 'screen-enter';

  let navHTML = '';
  if (!isAdmin) {
    const navItems = role === 'tenant'
      ? [
          { icon:'🗺', label:'Карта', screen:'t-map' },
          { icon:'📋', label:'Брони', screen:'t-bookings' },
          { icon:'💬', label:'Чат', screen:'t-chat' },
          { icon:'👤', label:'Профиль', screen:'t-profile' },
        ]
      : [
          { icon:'🏠', label:'Места', screen:'o-listings' },
          { icon:'💰', label:'Финансы', screen:'o-finance' },
          { icon:'📄', label:'Документы', screen:'o-docs' },
          { icon:'👤', label:'Профиль', screen:'t-profile' },
        ];
    navHTML = `<div class="phone-nav">${navItems.map(n =>
      `<div class="nav-item ${currentScreen===n.screen?'active':''}" onclick="go('${n.screen}')">
        <div class="nav-icon">${n.icon}</div>${n.label}
      </div>`
    ).join('')}</div>`;
  }

  phone.innerHTML = `
    <div class="phone-status">
      <span>9:41</span>
      <div class="icons"><span></span><span style="width:12px"></span><span style="width:20px;border-radius:3px"></span></div>
    </div>
    <div class="phone-content ${animClass}">${s()}</div>
    ${navHTML}
  `;
  setTimeout(initTapEffects, 50);
}

// ─── Calendar helper ───
function cal(days, opts = {}) {
  const headers = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div class="w-cal-day header">${d}</div>`).join('');
  const cells = days.map(d => {
    if (!d.v) return '<div class="w-cal-day"></div>';
    return `<div class="w-cal-day ${d.c||'available'}">${d.v}</div>`;
  }).join('');
  return `<div class="w-calendar">${headers}${cells}</div>`;
}
const aprDays = [
  {},{},{v:1},{v:2},{v:3},{v:4},{v:5},
  {v:6},{v:7,c:'selected'},{v:8},{v:9},{v:10,c:'booked'},{v:11,c:'booked'},{v:12,c:'booked'},
  {v:13},{v:14},{v:15},{v:16},{v:17},{v:18},{v:19},
  {v:20},{v:21},{v:22},{v:23},{v:24},{v:25},{v:26},
  {v:27},{v:28},{v:29},{v:30}
];

// ═══════════════════════════════════════
// ─── ALL SCREENS ───
// ═══════════════════════════════════════
const allScreens = {

// ──── TENANT ────
't-splash': () => `
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;height:100%;">
    <div style="width:80px;height:80px;border-radius:20px;background:var(--wire-accent);margin-bottom:24px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:800;">P</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:6px;">ParkRent</div>
    <div style="font-size:12px;color:var(--wire-text2);margin-bottom:40px;">Аренда парковочных мест</div>
    <div class="w-input"><span class="icon">🇷🇺</span> +7 (___) ___-__-__</div>
    <div class="w-btn primary tap" onclick="go('t-otp')">Получить код</div>
    <div style="font-size:11px;color:var(--wire-text2);margin-top:16px;">Продолжая, вы принимаете<br><span style="color:var(--wire-accent)">Условия использования</span></div>
  </div>`,

't-otp': () => `
  <div class="w-header"><div class="w-back" onclick="goBack()">←</div><div class="w-title">Введите код</div></div>
  <div style="padding:32px 24px;text-align:center;">
    <div style="font-size:13px;color:var(--wire-text2);margin-bottom:24px;">Код отправлен на<br><b>+7 (999) 123-45-67</b></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:32px;">
      ${[1,2,3,4].map((_,i) => `<div class="tap" onclick="go('t-role')" style="width:52px;height:56px;border-radius:12px;border:2px solid ${i<2?'var(--wire-accent)':'var(--wire-border)'};display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;">${i<2?'•':''}</div>`).join('')}
    </div>
    <div style="font-size:12px;color:var(--wire-text2);">Отправить повторно через <b>0:47</b></div>
  </div>`,

't-role': () => `
  <div class="w-header"><div class="w-back" onclick="goBack()">←</div><div class="w-title">Кто вы?</div></div>
  <div style="padding:24px 20px;">
    <div style="font-size:13px;color:var(--wire-text2);margin-bottom:24px;text-align:center;">Выберите основную роль</div>
    <div class="w-card tap" onclick="go('t-map')" style="border-color:var(--wire-accent);border-width:2px;cursor:pointer;">
      <div style="padding:20px;text-align:center;">
        <div style="font-size:36px;margin-bottom:8px;">🚗</div>
        <div style="font-size:16px;font-weight:700;">Ищу место</div>
        <div style="font-size:12px;color:var(--wire-text2);margin-top:4px;">Арендую парковочные места</div>
      </div>
    </div>
    <div class="w-card tap" onclick="switchRole('owner')" style="cursor:pointer;">
      <div style="padding:20px;text-align:center;">
        <div style="font-size:36px;margin-bottom:8px;">🏢</div>
        <div style="font-size:16px;font-weight:700;">Сдаю место</div>
        <div style="font-size:12px;color:var(--wire-text2);margin-top:4px;">Размещаю своё парковочное место</div>
      </div>
    </div>
  </div>`,

't-map': () => `
  <div style="position:relative;height:100%;">
    <div style="position:absolute;top:0;left:0;right:0;z-index:3;padding:12px 16px;">
      <div class="w-input search" style="box-shadow:0 2px 12px rgba(0,0,0,.1);margin-bottom:8px;"><span class="icon">🔍</span> Поиск по адресу</div>
      <div style="display:flex;gap:6px;overflow-x:auto;">
        <div class="w-tag blue" style="font-size:11px;padding:5px 12px;border-radius:20px;white-space:nowrap;">📍 Рядом</div>
        <div class="w-tag" style="font-size:11px;padding:5px 12px;border-radius:20px;background:var(--wire-bg);border:1px solid var(--wire-border);white-space:nowrap;">Сейчас</div>
        <div class="w-tag" style="font-size:11px;padding:5px 12px;border-radius:20px;background:var(--wire-bg);border:1px solid var(--wire-border);white-space:nowrap;">Месяц</div>
        <div class="w-tag tap" onclick="go('t-filters')" style="font-size:11px;padding:5px 12px;border-radius:20px;background:var(--wire-bg);border:1px solid var(--wire-border);white-space:nowrap;cursor:pointer;">⚙ Фильтры</div>
      </div>
    </div>
    <div style="height:100%;background:#e0ddd6;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--wire-text2);font-size:12px;">
      <div style="font-size:28px;margin-bottom:6px;opacity:.4;">🗺</div>
      Яндекс.Карты
